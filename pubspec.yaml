name: heic_native
description: "A Flutter plugin that converts HEIC/HEIF images to PNG using native platform APIs (iOS, Android, macOS, Windows, Linux)."
version: 0.1.1
repository: https://github.com/hugocornellier/heic_native
homepage: https://github.com/hugocornellier/heic_native
issue_tracker: https://github.com/hugocornellier/heic_native/issues

topics:
  - heic
  - heif
  - png
  - image-conversion

environment:
  sdk: ^3.5.0
  flutter: '>=3.27.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.hugocornellier.heic_native
        pluginClass: HeicNativePlugin
      ios:
        pluginClass: HeicNativePlugin
      linux:
        pluginClass: HeicNativePlugin
      macos:
        pluginClass: HeicNativePlugin
      windows:
        pluginClass: HeicNativePluginCApi
